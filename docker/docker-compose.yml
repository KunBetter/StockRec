services:
  postgres:
    image: postgres:15-alpine
    container_name: stockrec-postgres
    environment:
      POSTGRES_USER: stockrec
      POSTGRES_PASSWORD: stockrec_dev
      POSTGRES_DB: stockrec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockrec"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stockrec-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stockrec-app
    environment:
      - DATABASE_URL=postgresql+asyncpg://stockrec:stockrec_dev@postgres:5432/stockrec
      - DATABASE_URL_SYNC=postgresql://stockrec:stockrec_dev@postgres:5432/stockrec
      - REDIS_URL=redis://redis:6379/0
      - CONFIG_PATH=config.yaml
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../config.yaml:/app/config.yaml:ro
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx
    container_name: stockrec-nginx
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
